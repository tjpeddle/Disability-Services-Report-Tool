<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disability Services Report Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://unpkg.com/docx@9.5.1/dist/index.iife.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0e1a;color:#e2e6f0;font-family:'Outfit',sans-serif;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#0a0e1a}::-webkit-scrollbar-thumb{background:#2a3152;border-radius:4px}
input[type="file"]{display:none}.fade-up{animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.stat-card{transition:all .25s}.stat-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(56,120,255,.1)}
table{border-collapse:collapse;width:100%}th,td{padding:11px 16px;text-align:left;border-bottom:1px solid #1e2542;font-size:13px}
th{background:#0d1124;color:#7a84a6;font-weight:500;text-transform:uppercase;font-size:10.5px;letter-spacing:.07em;position:sticky;top:0;z-index:2}tr:hover td{background:#151d38}
.btn{padding:10px 22px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:13.5px;transition:all .2s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#3878ff,#5c6bff);color:#fff;box-shadow:0 4px 16px rgba(56,120,255,.25)}.btn-primary:hover{transform:translateY(-1px)}
.btn-outline{background:transparent;border:1.5px solid #2a3152;color:#c0c8e0}.btn-outline:hover{border-color:#3878ff;color:#3878ff}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}.badge-green{background:#22c58d18;color:#22c58d}.badge-red{background:#ef575718;color:#ef5757}
select{outline:none}button:disabled{opacity:.35;cursor:not-allowed}canvas{max-width:100%!important}
.gen-section{background:#111630;border-radius:14px;border:1px solid #1e2542;padding:20px;margin-bottom:16px}
.gen-label{font-size:12px;color:#7a84a6;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.gen-input{width:100%;background:#0a0e1a;border:1.5px solid #1e2542;border-radius:8px;padding:10px 14px;color:#e2e6f0;font-family:inherit;font-size:14px;resize:vertical}.gen-input:focus{outline:none;border-color:#3878ff}
.chip{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid #2a3152;background:transparent;color:#c0c8e0}
.chip.active{background:#3878ff22;border-color:#3878ff;color:#3878ff}.chip:hover{border-color:#3878ff}
.side-panel{position:fixed;top:0;right:0;height:100vh;width:380px;background:#111630;border-left:1px solid #1e2542;z-index:100;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);box-shadow:-8px 0 40px rgba(0,0,0,.4)}
.side-panel.open{transform:translateX(0)}
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;opacity:0;pointer-events:none;transition:opacity .3s}
.panel-overlay.open{opacity:1;pointer-events:all}
.row-clickable{cursor:pointer}.row-clickable:hover td{background:#1a2448!important}
.stat-mini{background:#0a0e1a;border-radius:10px;padding:14px 16px;border:1px solid #1e2542}
</style>
</head>
<body>
<div id="root"></div>
<div id="chart-render-area" style="position:absolute;left:-9999px;top:-9999px;"></div>
<script type="text/babel">
const{useState,useMemo,useRef,useEffect}=React;

/* ═══ UTILITIES ═══ */
function parseCSV(t){const l=t.split(/\r?\n/).filter(l=>l.trim());if(!l.length)return[];const h=ssplit(l[0]);return l.slice(1).map(line=>{const v=ssplit(line),o={};h.forEach((hh,i)=>(o[hh.trim()]=(v[i]||"").trim()));return o})}
function ssplit(l){const r=[];let c="",q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"')q=!q;else if(ch===","&&!q){r.push(c);c=""}else c+=ch}r.push(c);return r}
async function parseExcel(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""}))}catch(err){rej(err)}};r.onerror=rej;r.readAsArrayBuffer(f)})}
async function parseFile(f){if(f.name.endsWith(".csv"))return parseCSV(await f.text());return parseExcel(f)}
function dlXLSX(rows,fn){if(!rows.length)return;const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Report");XLSX.writeFile(wb,fn)}

const CO={bg:"#0a0e1a",card:"#111630",border:"#1e2542",accent:"#3878ff",accentSoft:"#3878ff18",green:"#22c58d",red:"#ef5757",yellow:"#f0b429",orange:"#f08c3a",purple:"#8b6cff",text:"#e2e6f0",muted:"#7a84a6",dim:"#4a5272"};
const UG=["Freshman","Sophomore","Junior","Senior"];
const PALETTES={
  Default:["#22c58d","#ef5757","#3878ff","#8b6cff","#f0b429","#f08c3a","#e05db0","#5cc9f5","#a3e048","#ff6b8a","#45d0e0","#ffb347"],
  Professional:["#2563eb","#dc2626","#059669","#d97706","#7c3aed","#db2777","#0891b2","#65a30d","#c2410c","#4f46e5","#0d9488","#a21caf"],
  Soft:["#93c5fd","#fca5a5","#86efac","#fde68a","#c4b5fd","#fbcfe8","#99f6e4","#fef08a","#fed7aa","#a5b4fc","#a7f3d0","#f9a8d4"],
  Warm:["#f97316","#ef4444","#eab308","#f59e0b","#dc2626","#fb923c","#fbbf24","#d97706","#c2410c","#ea580c","#ca8a04","#b91c1c"],
  Cool:["#3b82f6","#06b6d4","#8b5cf6","#6366f1","#0ea5e9","#14b8a6","#a78bfa","#2dd4bf","#818cf8","#22d3ee","#7c3aed","#0891b2"],
  Earth:["#92400e","#166534","#854d0e","#1e3a5f","#7c2d12","#365314","#78350f","#1e40af","#9a3412","#15803d","#a16207","#1d4ed8"],
};

function normCL(cl){if(!cl)return"";const l=cl.trim().toLowerCase();if(l.includes("fresh"))return"Freshman";if(l.includes("soph"))return"Sophomore";if(l.includes("jun"))return"Junior";if(l.includes("sen"))return"Senior";if(l.includes("grad")&&!l.includes("incoming"))return"Graduate";if(l.includes("doct"))return"Doctoral";if(l.includes("alum"))return"Alumni";if(l.includes("exchange"))return"Exchange Program";if(l.includes("incoming"))return"Incominggr";return cl.trim()}
function isH(a){if(!a)return false;const l=a.toLowerCase();return l.includes("housing accommodation")||l.includes("emotional support animal")||l.includes("service animal")||l.includes("accessible transportation")}
function isA(a){return a&&!isH(a)}
function cHN(n){return n?(n.replace(/Housing Accommodation\/?/gi,"").replace(/^\//,"").trim()||n):""}

function bSum(data,fS,sS,cFn){
  const acc={};data.forEach(r=>{const raw=r["Requested Accommodation"]||"";const a=cFn?cFn(raw):raw;const st=(r["Approved"]||"").toLowerCase();const sem=r["Semester (course)"]||"";const sid=r["Student ID"]||r["Name"];if(!a)return;
    if(!acc[a])acc[a]={name:a,fA:new Set(),fD:new Set(),sA:new Set(),sD:new Set(),tot:new Set(),yA:new Set(),yD:new Set()};
    const x=acc[a];x.tot.add(sid);if(sem===fS){if(st==="approved")x.fA.add(sid);else if(st==="denied")x.fD.add(sid)}if(sem===sS){if(st==="approved")x.sA.add(sid);else if(st==="denied")x.sD.add(sid)}if(st==="approved")x.yA.add(sid);else if(st==="denied")x.yD.add(sid)});
  return Object.values(acc).map(a=>({name:a.name,fallApproved:a.fA.size,fallDenied:a.fD.size,springApproved:a.sA.size,springDenied:a.sD.size,totalUnique:a.tot.size,calApproved:a.yA.size,calDenied:a.yD.size})).sort((a,b)=>b.totalUnique-a.totalUnique);
}

function renderChartToPNG(type,data,options,width,height){
  return new Promise((resolve)=>{
    const area=document.getElementById('chart-render-area');const canvas=document.createElement('canvas');
    canvas.width=width;canvas.height=height;area.appendChild(canvas);
    const defaults={responsive:false,animation:false,plugins:{legend:{labels:{color:"#333",font:{family:"Arial",size:13,weight:'bold'},padding:14}},tooltip:{enabled:false}},scales:type==='pie'||type==='doughnut'?{}:{x:{ticks:{color:"#444",font:{family:"Arial",size:12}},grid:{color:"#ddd"}},y:{ticks:{color:"#444",font:{family:"Arial",size:12}},grid:{color:"#ddd"}}}};
    const merged={...defaults,...options,plugins:{...defaults.plugins,...(options?.plugins||{})}};
    const chart=new Chart(canvas.getContext('2d'),{type,data,options:merged});
    setTimeout(()=>{const b64=canvas.toDataURL('image/png').split(',')[1];chart.destroy();area.removeChild(canvas);resolve(b64)},350);
  });
}

function PChart({type,data,options,height=260}){
  const ref=useRef();const ch=useRef();
  useEffect(()=>{if(ch.current)ch.current.destroy();
    const dO={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:CO.muted,font:{family:"'Outfit'",size:12},padding:14}},tooltip:{backgroundColor:"#1a2248",titleColor:CO.text,bodyColor:CO.muted,cornerRadius:8,padding:12}},scales:type==='pie'||type==='doughnut'?{}:{x:{ticks:{color:CO.dim,font:{family:"'Outfit'",size:11}},grid:{color:"#1a2040"}},y:{ticks:{color:CO.dim,font:{family:"'Outfit'",size:11}},grid:{color:"#1a2040"}}}};
    const m={...dO,...options,plugins:{...dO.plugins,...(options?.plugins||{})}};
    ch.current=new Chart(ref.current.getContext('2d'),{type,data,options:m});
    return()=>{if(ch.current)ch.current.destroy()};
  },[type,JSON.stringify(data),JSON.stringify(options)]);
  return <div style={{position:"relative",height}}><canvas ref={ref}/></div>;
}

function SC({label,value,sub,color=CO.accent,icon}){
  return(<div className="stat-card" style={{background:CO.card,borderRadius:14,border:`1px solid ${CO.border}`,padding:"20px 24px"}}>
    <p style={{fontSize:11.5,color:CO.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8,fontWeight:500}}>{label}</p>
    <p style={{fontSize:30,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color,lineHeight:1}}>{typeof value==="number"?value.toLocaleString():value}</p>
    {sub&&<p style={{fontSize:12,color:CO.muted,marginTop:6}}>{sub}</p>}</div>);
}
function Empty({msg}){return<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:400,opacity:.5}}><p style={{fontSize:16,color:CO.muted}}>{msg||"No data loaded. Import data first."}</p></div>}

/* ═══ SUMMARY PANEL ═══ */
function SummaryPanel({panel,onClose,fS,sS}){
  const open=!!panel;
  if(!panel)return(<><div className="panel-overlay"/><div className="side-panel"/></>);
  const {title,type,row,testRoomData,rawData,allStudents}=panel;

  // Build stats depending on panel type
  let content=null;
  if(type==="accommodation"&&row){
    const total=row.calApproved+row.calDenied;
    const pctA=total?((row.calApproved/total)*100).toFixed(1):"0";
    const pctD=total?((row.calDenied/total)*100).toFixed(1):"0";
    content=(<>
      <div style={{marginBottom:20}}>
        <p style={{fontSize:12,color:CO.dim,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Accommodation</p>
        <p style={{fontSize:15,fontWeight:700,color:CO.text,lineHeight:1.4}}>{row.name}</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        <div className="stat-mini"><p style={{fontSize:11,color:CO.muted,marginBottom:4}}>Unique Students</p><p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.accent}}>{row.totalUnique.toLocaleString()}</p></div>
        <div className="stat-mini"><p style={{fontSize:11,color:CO.muted,marginBottom:4}}>Total Records</p><p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.purple}}>{total.toLocaleString()}</p></div>
        <div className="stat-mini"><p style={{fontSize:11,color:CO.muted,marginBottom:4}}>Approved</p><p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.green}}>{row.calApproved.toLocaleString()}</p><p style={{fontSize:11,color:CO.muted,marginTop:2}}>{pctA}% of total</p></div>
        <div className="stat-mini"><p style={{fontSize:11,color:CO.muted,marginBottom:4}}>Denied</p><p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.red}}>{row.calDenied.toLocaleString()}</p><p style={{fontSize:11,color:CO.muted,marginTop:2}}>{pctD}% of total</p></div>
      </div>
      <div style={{background:CO.bg,borderRadius:10,border:`1px solid ${CO.border}`,overflow:"hidden"}}>
        <table style={{width:"100%"}}>
          <thead><tr><th>Semester</th><th style={{textAlign:"right"}}>Approved</th><th style={{textAlign:"right"}}>Denied</th><th style={{textAlign:"right"}}>Unique</th></tr></thead>
          <tbody>
            <tr><td style={{fontWeight:500}}>{fS}</td><td style={{textAlign:"right"}}><span className="badge badge-green">{row.fallApproved}</span></td><td style={{textAlign:"right"}}><span className="badge badge-red">{row.fallDenied}</span></td><td style={{textAlign:"right",fontWeight:700}}>{(row.fallApproved+row.fallDenied).toLocaleString()}</td></tr>
            <tr><td style={{fontWeight:500}}>{sS}</td><td style={{textAlign:"right"}}><span className="badge badge-green">{row.springApproved}</span></td><td style={{textAlign:"right"}}><span className="badge badge-red">{row.springDenied}</span></td><td style={{textAlign:"right",fontWeight:700}}>{(row.springApproved+row.springDenied).toLocaleString()}</td></tr>
          </tbody>
        </table>
      </div>
      <div style={{marginTop:16,padding:12,borderRadius:10,background:`${CO.accent}10`,border:`1px solid ${CO.accent}30`}}>
        <p style={{fontSize:12,color:CO.muted,lineHeight:1.7}}>
          <strong style={{color:CO.accent}}>{row.totalUnique.toLocaleString()} students</strong> qualified for this accommodation.<br/>
          Approval rate: <strong style={{color:CO.green}}>{pctA}%</strong> &nbsp;|&nbsp; Denial rate: <strong style={{color:CO.red}}>{pctD}%</strong>
        </p>
      </div>
    </>);
  } else if(type==="testroom"&&testRoomData){
    const ft=testRoomData.filter(r=>r["Semester"]===fS).length;
    const st=testRoomData.filter(r=>r["Semester"]===sS).length;
    const total=testRoomData.length;
    const unique=new Set(testRoomData.map(r=>r["Student"])).size;
    const cancelled=testRoomData.filter(r=>(r["Appointment Cancelled"]||"").toLowerCase()==="yes").length;
    content=(<>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        <div className="stat-mini"><p style={{fontSize:11,color:CO.muted,marginBottom:4}}>Total Bookings</p><p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.yellow}}>{total.toLocaleString()}</p></div>
        <div className="stat-mini"><p style={{fontSize:11,color:CO.muted,marginBottom:4}}>Unique Students</p><p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.accent}}>{unique.toLocaleString()}</p></div>
        <div className="stat-mini"><p style={{fontSize:11,color:CO.muted,marginBottom:4}}>Cancelled</p><p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.red}}>{cancelled.toLocaleString()}</p><p style={{fontSize:11,color:CO.muted,marginTop:2}}>{total?((cancelled/total)*100).toFixed(1):0}% of bookings</p></div>
        <div className="stat-mini"><p style={{fontSize:11,color:CO.muted,marginBottom:4}}>Attended</p><p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.green}}>{(total-cancelled).toLocaleString()}</p></div>
      </div>
      <div style={{background:CO.bg,borderRadius:10,border:`1px solid ${CO.border}`,overflow:"hidden"}}>
        <table style={{width:"100%"}}>
          <thead><tr><th>Semester</th><th style={{textAlign:"right"}}>Bookings</th><th style={{textAlign:"right"}}>% of Total</th></tr></thead>
          <tbody>
            <tr><td style={{fontWeight:500}}>{fS}</td><td style={{textAlign:"right",fontWeight:700}}>{ft.toLocaleString()}</td><td style={{textAlign:"right",color:CO.orange}}>{total?((ft/total)*100).toFixed(1):0}%</td></tr>
            <tr><td style={{fontWeight:500}}>{sS}</td><td style={{textAlign:"right",fontWeight:700}}>{st.toLocaleString()}</td><td style={{textAlign:"right",color:CO.green}}>{total?((st/total)*100).toFixed(1):0}%</td></tr>
          </tbody>
        </table>
      </div>
    </>);
  } else if(type==="students"&&allStudents){
    const{all,fe,se,sue,tot}=allStudents;
    const lvls=Object.keys(all).sort((a,b)=>all[b]-all[a]);
    content=(<>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        <div className="stat-mini" style={{gridColumn:"span 2"}}><p style={{fontSize:11,color:CO.muted,marginBottom:4}}>Total Unique Students</p><p style={{fontSize:32,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.accent}}>{tot(all).toLocaleString()}</p></div>
        <div className="stat-mini"><p style={{fontSize:11,color:CO.muted,marginBottom:4}}>{fS}</p><p style={{fontSize:22,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.orange}}>{tot(fe).toLocaleString()}</p></div>
        <div className="stat-mini"><p style={{fontSize:11,color:CO.muted,marginBottom:4}}>{sS}</p><p style={{fontSize:22,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.green}}>{tot(se).toLocaleString()}</p></div>
      </div>
      <div style={{background:CO.bg,borderRadius:10,border:`1px solid ${CO.border}`,overflow:"hidden",maxHeight:320,overflowY:"auto"}}>
        <table style={{width:"100%"}}>
          <thead><tr><th>Class Level</th><th style={{textAlign:"right"}}>Fall</th><th style={{textAlign:"right"}}>Spring</th><th style={{textAlign:"right"}}>Total</th></tr></thead>
          <tbody>{lvls.map(cl=><tr key={cl}><td style={{fontWeight:500}}>{cl}</td><td style={{textAlign:"right"}}>{(fe[cl]||0).toLocaleString()}</td><td style={{textAlign:"right"}}>{(se[cl]||0).toLocaleString()}</td><td style={{textAlign:"right",fontWeight:700,color:CO.accent}}>{(all[cl]||0).toLocaleString()}</td></tr>)}</tbody>
        </table>
      </div>
    </>);
  }

  return(<>
    <div className={`panel-overlay${open?" open":""}`} onClick={onClose}/>
    <div className={`side-panel${open?" open":""}`}>
      <div style={{padding:"20px 24px",borderBottom:`1px solid ${CO.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div>
          <p style={{fontSize:11,color:CO.dim,textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>Summary</p>
          <h3 style={{fontSize:16,fontWeight:700}}>{title}</h3>
        </div>
        <button onClick={onClose} style={{background:"transparent",border:`1.5px solid ${CO.border}`,borderRadius:8,color:CO.muted,cursor:"pointer",padding:"6px 12px",fontSize:14,fontFamily:"inherit"}}>✕ Close</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
        {content}
      </div>
    </div>
  </>);
}

/* ═══ IMPORT TAB ═══ */
function ImportTab({rawData,setRawData,testRoomData,setTestRoomData,testAccomData,setTestAccomData,apptData,setApptData,caseNotesData,setCaseNotesData,studentNotesData,setStudentNotesData,incomingData,setIncomingData,iSt,setISt,ld,setLd}){
  const rR=useRef(),tR=useRef(),taR=useRef(),aR=useRef(),cnR=useRef(),snR=useRef(),inR=useRef();
  const handle=async(e,type)=>{const file=e.target.files[0];if(!file)return;setLd(true);try{
    // Special handling for incoming — duplicate "Approved" headers collapse in XLSX.js
    if(type==="incoming"){
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:"array",cellDates:false,raw:false});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:""});
      // Col 0=Name,1=StudentID,2=RequestedAccom,3=ClassLevel,4=ApprovedDate,5=ApprovedStatus
      const finalData=rows.slice(1).filter(r=>String(r[0]||"").trim()).map(r=>({
        "Name":String(r[0]||"").trim(),
        "Student ID":String(r[1]||"").trim(),
        "Requested Accommodation":String(r[2]||"").trim(),
        "Class Level":String(r[3]||"").trim(),
        "_ApprovedDate":String(r[4]||"").trim(),
        "_ApprovedStatus":String(r[5]||"").trim(),
      }));
      setIncomingData(finalData);
      setISt(s=>({...s,incoming:{ok:true,ct:finalData.length,fn:file.name}}));
      setLd(false);return;
    }
    const data=await parseFile(file);
    const norm=data.map(row=>{const r={};Object.keys(row).forEach(k=>{r[k.trim()]=typeof row[k]==="string"?row[k].trim():String(row[k]??'').trim()});return r});
    const filtered=norm.filter(r=>{
      if(type==="test")return r["Student"];
      if(type==="appt")return r["Symplicity Student ID"]||r["Student ID"];
      if(type==="casenotes")return r["Symplicity Student ID"]||r["Name of Specialist"];
      if(type==="studentnotes")return r["Symplicity Student ID"]||r["Created By (Student)"];
      return r["Name"]||r["Student ID"];
    });
    const finalData=filtered;
    if(type==="raw")setRawData(finalData);
    else if(type==="test")setTestRoomData(finalData);
    else if(type==="testaccom")setTestAccomData(finalData);
    else if(type==="appt")setApptData(finalData);
    else if(type==="casenotes")setCaseNotesData(finalData);
    else if(type==="studentnotes")setStudentNotesData(finalData);
    setISt(s=>({...s,[type]:{ok:true,ct:finalData.length,fn:file.name}}));}catch(err){setISt(s=>({...s,[type]:{ok:false,err:err.message}}))}setLd(false)};
  const slots=[
    {t:"raw",ref:rR,col:CO.accent,icon:"◎",title:"Academic & Housing Accommodations",cols:"Name, Student ID, Class Level, Requested Accommodation, Approved, Semester (course)"},

    {t:"studentnotes",ref:snR,col:"#c522a0",icon:"🗒️",title:"Student Notes (Indirect Contacts)",cols:"Symplicity Student ID, Category (Student), Date Created (Student), Created By (Student), Duration (Student)"},
    {t:"incoming",ref:inR,col:"#e6b94a",icon:"🎓",title:"New Student Registrations",cols:"Name, Student ID, Requested Accommodation, Class Level, Approved (date), Approved (status)"},
  ];
  return(<div className="fade-up">

    <p style={{color:CO.muted,marginBottom:28}}>Upload .xlsx, .xlsm, .xls, or .csv files. Load all files for full reporting.</p>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,maxWidth:1100}}>
      {slots.map(c=>(<div key={c.t} style={{background:CO.card,borderRadius:14,border:`1.5px solid ${iSt[c.t]?.ok?c.col+"66":CO.border}`,padding:20}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <div style={{width:30,height:30,borderRadius:8,background:`${c.col}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>{c.icon}</div>
          <h3 style={{fontSize:13,fontWeight:700,lineHeight:1.3}}>{c.title}</h3>
        </div>
        <p style={{fontSize:10.5,color:CO.muted,marginBottom:12,lineHeight:1.5}}>Columns: <strong style={{color:CO.text}}>{c.cols}</strong></p>
        <input ref={c.ref} type="file" accept=".csv,.xlsx,.xlsm,.xls" onChange={e=>handle(e,c.t)}/>
        <button className="btn btn-primary" onClick={()=>c.ref.current.click()} style={{width:"100%",background:c.col,fontSize:12,padding:"8px 14px"}}>{ld?"Processing…":"Choose File & Import"}</button>
        {iSt[c.t]&&<div style={{marginTop:10,padding:8,borderRadius:8,background:iSt[c.t].ok?`${CO.green}12`:`${CO.red}12`,fontSize:11}}>
          {iSt[c.t].ok?<span style={{color:CO.green}}>✓ {iSt[c.t].ct.toLocaleString()} records — {iSt[c.t].fn}</span>:<span style={{color:CO.red}}>✗ {iSt[c.t].err}</span>}</div>}
      </div>))}
    </div>
    {rawData.length>0&&<div style={{marginTop:24,background:CO.card,borderRadius:14,border:`1px solid ${CO.border}`,padding:18}}>

  </div>);
}

function ExecTab({rawData,testRoomData,testAccomData,apptData,caseNotesData,studentNotesData,incomingData,fS,sS,suS}){
  if(!rawData.length)return<Empty msg="Import the Academic & Housing Accommodations file to view the Executive Summary."/>;

  const sid=r=>r["Student ID"]||r["Name"]||"unknown";
  const isApproved=r=>(r["Approved"]||"").toLowerCase()==="approved";
  const isDenied=r=>(r["Approved"]||"").toLowerCase()==="denied";

  // Core student counts
  const uniqueStudents=useMemo(()=>new Set(rawData.map(sid)).size,[rawData]);
  const approvedStudents=useMemo(()=>new Set(rawData.filter(isApproved).map(sid)).size,[rawData]);
  const deniedStudents=useMemo(()=>new Set(rawData.filter(r=>isDenied(r)&&!rawData.filter(isApproved).find(a=>sid(a)===sid(r))).map(sid)).size,[rawData]);
  const approvalRate=uniqueStudents?((approvedStudents/uniqueStudents)*100).toFixed(1):0;

  // Academic top/least
  const acadRows=useMemo(()=>rawData.filter(r=>isA(r["Requested Accommodation"])),[rawData]);
  const acadSummary=useMemo(()=>{
    const m={};acadRows.forEach(r=>{const a=r["Requested Accommodation"];if(!a)return;if(!m[a])m[a]={appr:new Set(),den:new Set()};if(isApproved(r))m[a].appr.add(sid(r));else if(isDenied(r))m[a].den.add(sid(r))});
    return Object.entries(m).map(([name,v])=>({name,approved:v.appr.size,denied:v.den.size,total:v.appr.size+v.den.size})).sort((a,b)=>b.total-a.total);
  },[acadRows]);
  const top5Acad=acadSummary.slice(0,5);
  const leastAcad=acadSummary.length?acadSummary[acadSummary.length-1]:null;

  // Housing top/least
  const housRows=useMemo(()=>rawData.filter(r=>isH(r["Requested Accommodation"])),[rawData]);
  const housSummary=useMemo(()=>{
    const m={};housRows.forEach(r=>{const a=cHN(r["Requested Accommodation"]);if(!a)return;if(!m[a])m[a]={appr:new Set(),den:new Set()};if(isApproved(r))m[a].appr.add(sid(r));else if(isDenied(r))m[a].den.add(sid(r))});
    return Object.entries(m).map(([name,v])=>({name,approved:v.appr.size,denied:v.den.size,total:v.appr.size+v.den.size})).sort((a,b)=>b.total-a.total);
  },[housRows]);
  const top3Hous=housSummary.slice(0,3);
  const leastHous=housSummary.length?housSummary[housSummary.length-1]:null;

  // Testing center
  const testBooked=testRoomData.length;
  const testDelivered=testRoomData.filter(r=>(r["Appointment Cancelled"]||"").toLowerCase()!=="yes").length;
  const testCancelled=testRoomData.filter(r=>(r["Appointment Cancelled"]||"").toLowerCase()==="yes").length;
  const testCancelRate=testBooked?((testCancelled/testBooked)*100).toFixed(1):0;
  const fallTests=testRoomData.filter(r=>(r["Semester"]||"").includes(fS.split(" ")[1]||"")&&(r["Semester"]||"").toLowerCase().includes("fall")).length;
  const springTests=testRoomData.filter(r=>(r["Semester"]||"").toLowerCase().includes("spring")).length;
  const testAccomApproved=testAccomData.length?new Set(testAccomData.filter(r=>(r["Approved"]||"").toLowerCase()==="approved").map(r=>r["Student ID"]||r["Name"])).size:null;

  // Direct services
  const apptDelivered=apptData.filter(r=>(r["Appointment Cancelled"]||"").toLowerCase()!=="yes");
  const apptHrs=apptData.length?(apptDelivered.reduce((a,r)=>a+(parseInt(r["Appointment Length"])||0),0)/60).toFixed(1):null;
  const apptUnique=apptData.length?new Set(apptDelivered.map(r=>r["Symplicity Student ID"]||r["Student ID"]||r["Name"])).size:null;

  // Indirect contacts
  const allNotes=[...caseNotesData,...studentNotesData];
  const notesHrs=allNotes.length?(allNotes.reduce((a,r)=>a+(parseInt(r["Duration (Case)"]||r["Duration (Student)"])||0),0)/60).toFixed(1):null;
  const notesUnique=allNotes.length?new Set(allNotes.map(r=>r["Symplicity Student ID"]||"unknown")).size:null;

  // Combined service hours
  const combinedHrs=(apptHrs&&notesHrs)?(parseFloat(apptHrs)+parseFloat(notesHrs)).toFixed(1):null;

  // Incoming snapshot
  const inWithAccom=incomingData.filter(r=>(r["Requested Accommodation"]||"").trim());
  const inApproved=incomingData.length?new Set(inWithAccom.filter(r=>(r["_ApprovedStatus"]||"").toLowerCase()==="approved").map(r=>r["Student ID"]||r["Name"])).size:null;
  const inTotal=incomingData.length?new Set(inWithAccom.map(r=>r["Student ID"]||r["Name"])).size:null;

  // Chart data — top 5 academic
  const acadChartData={
    labels:top5Acad.map(r=>r.name.length>30?r.name.slice(0,28)+"…":r.name),
    datasets:[
      {label:"Approved",data:top5Acad.map(r=>r.approved),backgroundColor:`${CO.green}cc`,borderRadius:4},
      {label:"Denied",data:top5Acad.map(r=>r.denied),backgroundColor:`${CO.red}99`,borderRadius:4},
    ]
  };
  const acadChartOptions={indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{color:CO.muted,font:{size:11}}},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.x.toLocaleString()}`}}},scales:{x:{stacked:false,grid:{color:CO.border},ticks:{color:CO.muted,font:{size:11}}},y:{grid:{display:false},ticks:{color:CO.text,font:{size:11}}}}};

  // Chart data — testing bar
  const testChartData={
    labels:[fS,sS,"Grand Total"],
    datasets:[{label:"Exams",data:[fallTests,springTests,testDelivered],backgroundColor:[`${CO.orange}cc`,`${CO.green}cc`,`${CO.purple}cc`],borderRadius:6}]
  };
  const testChartOptions={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y.toLocaleString()} exams`}}},scales:{x:{grid:{display:false},ticks:{color:CO.muted}},y:{grid:{color:CO.border},ticks:{color:CO.muted}}}};

  const Divider=({label})=>(
    <div style={{display:"flex",alignItems:"center",gap:12,margin:"24px 0 16px"}}>
      <div style={{height:1,flex:1,background:CO.border}}/>
      <span style={{fontSize:11,color:CO.dim,fontWeight:600,textTransform:"uppercase",letterSpacing:".08em",whiteSpace:"nowrap"}}>{label}</span>
      <div style={{height:1,flex:1,background:CO.border}}/>
    </div>
  );

  return(<div className="fade-up" style={{maxHeight:"calc(100vh - 120px)",overflowY:"auto",paddingRight:4}}>
    <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:6}}>
      <h2 style={{fontSize:26,fontWeight:800}}>Executive Summary</h2>
      <span style={{fontSize:12,color:CO.dim,fontFamily:"'JetBrains Mono',monospace"}}>{fS} — {sS}</span>
    </div>
    <p style={{fontSize:13,color:CO.muted,marginBottom:20}}>Live dashboard — updates automatically when new data files are imported.</p>

    {/* Row 1 — Core students */}
    <Divider label="Student Population"/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:8}}>
      <SC label="Total Unique Students" value={uniqueStudents} color={CO.accent}/>
      <SC label="At Least One Approved" value={approvedStudents} color={CO.green} sub={`${approvalRate}% approval rate`}/>
      <SC label="Denied All" value={deniedStudents} color={CO.red}/>
      <SC label="Total Accommodation Records" value={rawData.length} color={CO.purple}/>
    </div>

    {/* Row 2 — Testing center */}
    {testRoomData.length>0&&<>
      <Divider label="Testing Center"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:16}}>
        <SC label="Total Booked" value={testBooked} color={CO.accent}/>
        <SC label="Delivered" value={testDelivered} color={CO.green}/>
        <SC label="Cancelled" value={testCancelled} color={CO.red} sub={`${testCancelRate}% rate`}/>
        <SC label={`${fS} Exams`} value={fallTests} color={CO.orange}/>
        <SC label={`${sS} Exams`} value={springTests} color={CO.yellow}/>
      </div>
      {testAccomApproved!=null&&<div style={{padding:"12px 18px",borderRadius:10,background:`${CO.orange}0c`,border:`1px solid ${CO.orange}20`,marginBottom:8,fontSize:13,color:CO.muted}}>
        ✎ <strong style={{color:CO.orange}}>{testAccomApproved.toLocaleString()}</strong> unique students approved for testing accommodations
      </div>}
    </>}

    {/* Row 3 — Service hours */}
    {(apptData.length>0||allNotes.length>0)&&<>
      <Divider label="Direct & Indirect Service"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:8}}>
        <SC label="Direct Appt. Delivered" value={apptData.length?apptDelivered.length:"—"} color={"#22c5c5"}/>
        <SC label="Direct Service Hours" value={apptHrs||"—"} color={CO.green}/>
        <SC label="Indirect Contacts" value={allNotes.length?allNotes.length:"—"} color={"#c57a22"}/>
        <SC label="Indirect Contact Hours" value={notesHrs||"—"} color={"#c522a0"}/>
      </div>
      {combinedHrs&&<div style={{padding:"12px 18px",borderRadius:10,background:`${CO.green}0c`,border:`1px solid ${CO.green}20`,marginBottom:8,fontSize:13,color:CO.muted}}>
        🕐 <strong style={{color:CO.green}}>{combinedHrs}</strong> combined service hours delivered across direct appointments and indirect contacts
      </div>}
    </>}

    {/* Row 4 — Incoming */}
    {incomingData.length>0&&<>
      <Divider label="Incoming New Students (Separate Population)"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:8}}>
        <SC label="Interacted with OARS" value={inTotal||0} color={"#e6b94a"}/>
        <SC label="At Least One Approved" value={inApproved||0} color={CO.green}/>
        <SC label="Denied All" value={inTotal&&inApproved?inTotal-inApproved:0} color={CO.red}/>
      </div>
      <div style={{padding:"10px 18px",borderRadius:10,background:"#e6b94a0c",border:"1px solid #e6b94a20",marginBottom:8,fontSize:12,color:CO.dim}}>
        🎓 Incoming students are tracked separately and not included in the main student population counts above.
      </div>
    </>}

    {/* Row 5 — Charts */}
    <Divider label="Accommodation Highlights"/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:20}}>

      {/* Top 5 Academic chart */}
      <div style={{background:CO.card,borderRadius:14,border:`1px solid ${CO.border}`,padding:20}}>
        <p style={{fontSize:12,fontWeight:700,color:CO.accent,textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}}>◎ Top 5 Academic Accommodations</p>
        <div style={{height:220}}><PChart type="bar" data={acadChartData} options={acadChartOptions} height={220}/></div>

        {testRoomData.length>0
          ?<div style={{height:220}}><PChart type="bar" data={testChartData} options={testChartOptions} height={220}/></div>
          :<div style={{height:220,display:"flex",alignItems:"center",justifyContent:"center",color:CO.dim,fontSize:13}}>Import Test Room Bookings file to view chart</div>}
      </div>
    </div>

    {/* Row 6 — Top/Least callout cards */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:20}}>

      {/* Top housing */}
      <div style={{background:CO.card,borderRadius:14,border:`1px solid ${CO.border}`,padding:20}}>
        <p style={{fontSize:12,fontWeight:700,color:CO.purple,textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}}>⌂ Top 3 Housing Accommodations</p>
        {top3Hous.map((h,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10,padding:"10px 14px",borderRadius:10,background:`${CO.purple}08`}}>
            <span style={{fontSize:18,fontWeight:800,color:CO.purple,fontFamily:"'JetBrains Mono',monospace",minWidth:24}}>#{i+1}</span>
            <div style={{flex:1}}>
              <p style={{fontSize:13,fontWeight:600}}>{h.name}</p>
              <p style={{fontSize:11,color:CO.muted}}>{h.approved} approved · {h.denied} denied · {h.total} total</p>
            </div>
          </div>
        ))}
      </div>

      {/* Least requested */}
      <div style={{background:CO.card,borderRadius:14,border:`1px solid ${CO.border}`,padding:20}}>
        <p style={{fontSize:12,fontWeight:700,color:CO.dim,textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}}>Least Requested Accommodations</p>
        {leastAcad&&<div style={{marginBottom:12,padding:"12px 16px",borderRadius:10,background:`${CO.accent}08`}}>
          <p style={{fontSize:11,color:CO.accent,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>◎ Academic</p>
          <p style={{fontSize:14,fontWeight:700}}>{leastAcad.name}</p>
          <p style={{fontSize:12,color:CO.muted}}>{leastAcad.total} total request{leastAcad.total!==1?"s":""} · {leastAcad.approved} approved</p>
        </div>}
        {leastHous&&<div style={{padding:"12px 16px",borderRadius:10,background:`${CO.purple}08`}}>
          <p style={{fontSize:11,color:CO.purple,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>⌂ Housing</p>
          <p style={{fontSize:14,fontWeight:700}}>{leastHous.name}</p>
          <p style={{fontSize:12,color:CO.muted}}>{leastHous.total} total request{leastHous.total!==1?"s":""} · {leastHous.approved} approved</p>
        </div>}
      </div>
    </div>

    <p style={{fontSize:11,color:CO.dim,textAlign:"center",paddingBottom:16}}>For full accommodation tables, charts, and Word report export — use the tabs on the left.</p>
  </div>);
}

/* ═══ GENERATE REPORT TAB ═══ */
function GenReportTab({rawData,testRoomData,fS,sS,suS,academicYear}){
  const[prepFor,setPF]=useState("Andy Bills, Senior Vice President for Career and Professional Development, Student Success and Executive Education");
  const[prepBy,setPB]=useState("Joel Peddle, Assistant Director of Assistive Technology & OARS Testing Center");

  const[highlights,setHL]=useState([]);
  const[generating,setGEN]=useState(false);
  const[genStatus,setGS]=useState(null);
  const[progress,setProg]=useState("");

  const us=rawData.length?new Set(rawData.map(r=>r["Student ID"]||r["Name"])).size:0;
  const ap=rawData.filter(r=>(r["Approved"]||"").toLowerCase()==="approved").length;

  const ft=testRoomData.filter(r=>r["Semester"]===fS).length;const st=testRoomData.filter(r=>r["Semester"]===sS).length;
  const clC=useMemo(()=>{const c={},s=new Set();rawData.forEach(r=>{const sid=r["Student ID"]||r["Name"];if(s.has(sid))return;s.add(sid);const cl=normCL(r["Class Level"]);c[cl]=(c[cl]||0)+1});return c},[rawData]);

  const dOpts=(c)=>c.type==="bar"?{plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{beginAtZero:true}}}:{cutout:c.type==="doughnut"?"60%":"0%",plugins:{legend:{position:"bottom"}}};
  const barAccOpts=()=>({indexAxis:'y',plugins:{legend:{display:true}},scales:{x:{grid:{color:"#1a2040"}},y:{grid:{display:false},ticks:{font:{size:11}}}}});

  const[charts,setCh]=useState({
    approval:{id:"approval",title:"Approval vs Denial",figLabel:"Figure 1",type:"doughnut",palette:"Default",twoColor:true,c1:"#22c58d",c2:"#ef5757",c1Label:"Approved",c2Label:"Denied",allowedTypes:["doughnut","pie","bar"],ph:240,
      mkData:(c)=>({labels:["Approved","Denied"],datasets:[{data:[ap,dn],backgroundColor:[c.c1,c.c2],borderWidth:0}]}),mkOpts:dOpts},
    classLevel:{id:"classLevel",title:"Students by Class Level",figLabel:"Figure 2",type:"doughnut",palette:"Default",allowedTypes:["doughnut","pie","bar"],ph:280,
      mkData:(c)=>{const pal=PALETTES[c.palette]||PALETTES.Default;return c.type==="bar"?{labels:clL,datasets:[{label:"Students",data:clL.map(l=>clC[l]),backgroundColor:pal.slice(0,clL.length),borderRadius:4}]}:{labels:clL,datasets:[{data:clL.map(l=>clC[l]),backgroundColor:pal.slice(0,clL.length),borderWidth:0}]}},mkOpts:dOpts},
    semester:{id:"semester",title:"Students by Semester",figLabel:"Figure 3",type:"bar",palette:"Default",twoColor:true,c1:"#f08c3a",c2:"#22c58d",c1Label:fS,c2Label:sS,allowedTypes:["bar","doughnut","pie"],ph:220,
      mkData:(c)=>c.type==="bar"?{labels:[fS,sS],datasets:[{label:"Students",data:[fs,ss],backgroundColor:[c.c1,c.c2],borderRadius:6}]}:{labels:[fS,sS],datasets:[{data:[fs,ss],backgroundColor:[c.c1,c.c2],borderWidth:0}]},mkOpts:dOpts},
    academic:{id:"academic",title:"Top Academic Accommodations",figLabel:"Figure 4",type:"bar",palette:"Default",twoColor:true,c1:"#22c58d",c2:"#ef5757",c1Label:"Approved",c2Label:"Denied",allowedTypes:["bar"],allowTopN:true,topN:10,ph:320,
      mkData:(c)=>{const d=allAcad.slice(0,c.topN||10);return{labels:d.map(a=>a.name.length>40?a.name.slice(0,37)+"…":a.name),datasets:[{label:"Approved",data:d.map(a=>a.calApproved),backgroundColor:c.c1+"cc",borderRadius:4},{label:"Denied",data:d.map(a=>a.calDenied),backgroundColor:c.c2+"cc",borderRadius:4}]}},mkOpts:barAccOpts},
    housing:{id:"housing",title:"Top Housing Accommodations",figLabel:"Figure 5",type:"bar",palette:"Default",twoColor:true,c1:"#8b6cff",c2:"#ef5757",c1Label:"Approved",c2Label:"Denied",allowedTypes:["bar"],allowTopN:true,topN:10,ph:320,
      mkData:(c)=>{const d=allHous.slice(0,c.topN||10);return{labels:d.map(a=>a.name.length>35?a.name.slice(0,32)+"…":a.name),datasets:[{label:"Approved",data:d.map(a=>a.calApproved),backgroundColor:c.c1+"cc",borderRadius:4},{label:"Denied",data:d.map(a=>a.calDenied),backgroundColor:c.c2+"cc",borderRadius:4}]}},mkOpts:barAccOpts},
  });
  const upCh=(id,v)=>setCh(p=>({...p,[id]:v}));

  useEffect(()=>{if(!rawData.length)return;const lA=allAcad.length?allAcad[allAcad.length-1]:null;const lH=allHous.length?allHous[allHous.length-1]:null;
    setHL([`Total registered OARS students for ${academicYear}: ${us.toLocaleString()}.`,allAcad[0]?`${allAcad[0].name} is the most requested academic accommodation (${allAcad[0].totalUnique} unique students).`:"",lA?`Least requested academic: ${lA.name} (${lA.totalUnique} student(s)).`:"",(ft+st)?`Testing Center total: ${(ft+st).toLocaleString()} tests (${fS} + ${sS}).`:"",allHous[0]?`${allHous[0].name} is the most requested housing accommodation (${allHous[0].totalUnique} unique).`:""].filter(Boolean));
  },[rawData,testRoomData,fS,sS]);

  const generateDocx=async()=>{
    setGEN(true);setGS(null);setProg("Preparing...");

      const D=docx;if(!D||!D.Document)throw new Error("docx library not loaded. Refresh the page.");

        const wh=key==="academic"||key==="housing"?[700,420]:key==="classLevel"?[600,420]:[600,380];

      }

      setProg("Building document...");
      const bdr={style:D.BorderStyle.SINGLE,size:1,color:"999999"};const borders={top:bdr,bottom:bdr,left:bdr,right:bdr};
      const hdrSh={fill:"365F91",type:D.ShadingType.CLEAR};const cm={top:60,bottom:60,left:100,right:100};const tw=9360;
      const hR=(t)=>new D.TextRun({text:t,bold:true,color:"FFFFFF",size:20,font:"Calibri"});
      const cR=(t)=>new D.TextRun({text:String(t),size:20,font:"Calibri"});
      const imgR=(b64,w,h)=>new D.ImageRun({data:Uint8Array.from(atob(b64),c=>c.charCodeAt(0)),transformation:{width:w,height:h},type:"png"});
      const heading=(t,sz=28)=>new D.Paragraph({spacing:{before:300,after:150},children:[new D.TextRun({text:t,bold:true,size:sz,color:"365F91",font:"Calibri"})]});
      const footnote=(t)=>new D.Paragraph({spacing:{before:60,after:100},children:[new D.TextRun({text:t,size:18,font:"Calibri",color:"FF0000"})]});
      const sp=()=>new D.Paragraph({spacing:{after:100},children:[]});

      /* Exec summary table */
      const eRows=[["Metric",`Total ${academicYear}`,"Notes"],["Total Registered Students",us.toLocaleString(),`${fS}, ${sS}`],["Most Requested Academic",topA[0]?topA[0].name:"N/A",topA[0]?`${topA[0].totalUnique} students`:""],["Least Requested Academic",leastAI?leastAI.name:"N/A",leastAI?`${leastAI.totalUnique} student(s)`:""],["Most Requested Housing",topH[0]?topH[0].name:"N/A",topH[0]?`${topH[0].totalUnique} unique`:""],["Least Requested Housing",leastHI?leastHI.name:"N/A",leastHI?`${leastHI.totalUnique} student(s)`:""],["Tests ("+fS+")",ft.toLocaleString(),""],["Tests ("+sS+")",st.toLocaleString(),""],["Grand Total (Tests)",(ft+st).toLocaleString(),""]];
      const eCW=[3200,3200,2960];
      const eTable=new D.Table({width:{size:tw,type:D.WidthType.DXA},columnWidths:eCW,rows:eRows.map((row,ri)=>new D.TableRow({children:row.map((cell,ci)=>new D.TableCell({borders,margins:cm,width:{size:eCW[ci],type:D.WidthType.DXA},shading:ri===0?hdrSh:undefined,children:[new D.Paragraph({children:[ri===0?hR(cell):new D.TextRun({text:cell,size:20,font:"Calibri",bold:ci===0})]})]}))}))}); 

      /* Accom table */
      const mkAT=(data)=>{const cw=[3500,1700,1700,2360];return new D.Table({width:{size:tw,type:D.WidthType.DXA},columnWidths:cw,rows:[
        new D.TableRow({children:["Accommodation",`Approved ${academicYear}`,`Denied ${academicYear}`,"Total Unique"].map((h,i)=>new D.TableCell({borders,margins:cm,width:{size:cw[i],type:D.WidthType.DXA},shading:hdrSh,children:[new D.Paragraph({children:[hR(h)]})]}))}),
        ...data.map(r=>new D.TableRow({children:[new D.TableCell({borders,margins:cm,width:{size:cw[0],type:D.WidthType.DXA},children:[new D.Paragraph({children:[cR(r.name)]})]}),new D.TableCell({borders,margins:cm,width:{size:cw[1],type:D.WidthType.DXA},children:[new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[cR(String(r.calApproved))]})]}),new D.TableCell({borders,margins:cm,width:{size:cw[2],type:D.WidthType.DXA},children:[new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[cR(String(r.calDenied))]})]}),new D.TableCell({borders,margins:cm,width:{size:cw[3],type:D.WidthType.DXA},children:[new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.TextRun({text:String(r.totalUnique),bold:true,size:20,font:"Calibri"})]})]})]}))
      ]})};

      /* Test table */
      const tCW=[4680,4680];
      const tTable=new D.Table({width:{size:tw,type:D.WidthType.DXA},columnWidths:tCW,rows:[
        new D.TableRow({children:[new D.TableCell({borders,margins:cm,width:{size:tCW[0],type:D.WidthType.DXA},shading:hdrSh,children:[new D.Paragraph({children:[hR("Semester")]})]}),new D.TableCell({borders,margins:cm,width:{size:tCW[1],type:D.WidthType.DXA},shading:hdrSh,children:[new D.Paragraph({children:[hR("Test Count")]})]})]})
       ,new D.TableRow({children:[new D.TableCell({borders,margins:cm,width:{size:tCW[0],type:D.WidthType.DXA},children:[new D.Paragraph({children:[cR(fS)]})]}),new D.TableCell({borders,margins:cm,width:{size:tCW[1],type:D.WidthType.DXA},children:[new D.Paragraph({children:[cR(ft.toLocaleString())]})]})]})
       ,new D.TableRow({children:[new D.TableCell({borders,margins:cm,width:{size:tCW[0],type:D.WidthType.DXA},children:[new D.Paragraph({children:[cR(sS)]})]}),new D.TableCell({borders,margins:cm,width:{size:tCW[1],type:D.WidthType.DXA},children:[new D.Paragraph({children:[cR(st.toLocaleString())]})]})]})
       ,new D.TableRow({children:[new D.TableCell({borders,margins:cm,width:{size:tCW[0],type:D.WidthType.DXA},children:[new D.Paragraph({children:[new D.TextRun({text:"Total",bold:true,size:20,font:"Calibri"})]})]}),new D.TableCell({borders,margins:cm,width:{size:tCW[1],type:D.WidthType.DXA},children:[new D.Paragraph({children:[new D.TextRun({text:(ft+st).toLocaleString(),bold:true,size:20,font:"Calibri"})]})]})]})]});

      const doc=new D.Document({
        styles:{default:{document:{run:{font:"Calibri",size:22}}}},

        sections:[{properties:{page:{size:{width:12240,height:15840},margin:{top:720,bottom:720,left:720,right:720}}},
          children:[

            new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:60},children:[new D.TextRun({text:"Office of Accessibility Resources and Services",bold:true,size:28,color:"365F91",font:"Calibri"})]}),
            new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:200},children:[new D.TextRun({text:`Academic Year ${academicYear}`,size:24,color:"666666",font:"Calibri"})]}),
            sp(),
            new D.Paragraph({spacing:{after:60},children:[new D.TextRun({text:"Prepared for: ",bold:true,size:22,font:"Calibri"}),new D.TextRun({text:prepFor,size:22,font:"Calibri"})]}),
            new D.Paragraph({spacing:{after:60},children:[new D.TextRun({text:"Prepared by: ",bold:true,size:22,font:"Calibri"}),new D.TextRun({text:prepBy,size:22,font:"Calibri"})]}),
            new D.Paragraph({spacing:{after:200},children:[new D.TextRun({text:"Finalized by: ",bold:true,size:22,font:"Calibri"}),new D.TextRun({text:finalBy,size:22,font:"Calibri"})]}),
            new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{before:300,after:200},children:[new D.TextRun({text:"Executive Summary",bold:true,size:40,color:"365F91",font:"Calibri"})]}),
            eTable,
            new D.Paragraph({children:[new D.PageBreak()]}),
            heading("Summary of Accommodation Requests (by Calendar Year)"),
            heading("Top "+topA.length+" Academic Accommodations",26),
            mkAT(topA),
            footnote("*Total Unique = individual students counted once even if approved in both semesters."),
            sp(),heading("Top "+topH.length+" Housing Accommodations",26),
            mkAT(topH),
            footnote("*Total Unique = individual students counted once even if approved in both semesters."),
            new D.Paragraph({children:[new D.PageBreak()]}),
            heading("OARS Testing Center Summary",32),tTable,
            sp(),heading("Key Highlights and Takeaways",32),
            ...highlights.map(h=>new D.Paragraph({numbering:{reference:"bullets",level:0},spacing:{after:80},children:[new D.TextRun({text:h,size:22,font:"Calibri"})]})),

            new D.Paragraph({children:[new D.PageBreak()]}),
            new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{before:200,after:100},children:[new D.TextRun({text:"Charts & Figures",bold:true,size:40,color:"365F91",font:"Calibri"})]}),
            new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:250},children:[new D.TextRun({text:"Drag and drop these into your preferred locations, or keep as appendix.",size:20,font:"Calibri",italics:true,color:"888888"})]}),
            ...[["approval",420,280],["classLevel",420,295],["semester",440,260],["academic",500,300],["housing",500,300]].flatMap(([key,w,h])=>[
              sp(),new D.Paragraph({spacing:{after:80},children:[new D.TextRun({text:charts[key].figLabel+" — "+charts[key].title,bold:true,size:24,color:"365F91",font:"Calibri"})]}),
              new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:200},children:[imgR(imgs[key],w,h)]}),
            ]),
          ]}]});

      setProg("Packaging...");
      const blob=await D.Packer.toBlob(doc);const url=URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download=`OARS_Annual_Trends_Report_${academicYear}.docx`;a.click();URL.revokeObjectURL(url);
      setGS({ok:true});setProg("");
    }catch(err){setGS({ok:false,err:err.message});setProg("");console.error(err)}
    setGEN(false);
  };

  if(!rawData.length)return<Empty msg="Import data first to generate the report."/>;

  return(<div className="fade-up" style={{maxHeight:"calc(100vh - 120px)",overflowY:"auto",paddingRight:8}}>
    <h2 style={{fontSize:26,fontWeight:800,marginBottom:8}}>Generate Annual Trends Report</h2>
    <p style={{color:CO.muted,marginBottom:24,lineHeight:1.6}}>Customize your charts below with live previews, then generate the Word document. Charts go to an appendix you can rearrange in Word.</p>

    {/* Report Info */}

/* ═══ DIRECT SERVICES TAB ═══ */
function DirectServicesTab({apptData,fS,sS,suS}){
  if(!apptData.length)return<Empty msg="Import the Direct Service Appointments file from the Import tab."/>;

  const teal="#22c5c5";
  const getSem=r=>{
    const d=r["AppointmentDate"];
    if(!d||d==="Invalid Date")return"Unknown";
    const dt=typeof d==="string"?new Date(d):d;
    if(isNaN(dt))return"Unknown";
    const mo=dt.getMonth()+1,yr=dt.getFullYear();
    // Fall: Aug-Dec, Spring: Jan-May, Summer: Jun-Jul
    if(mo>=8&&mo<=12)return`Fall ${yr}`;
    if(mo>=1&&mo<=5)return`Spring ${yr}`;
    return`Summer ${yr}`;
  };

  const mins=r=>parseInt(r["Appointment Length"])||0;
  const sid=r=>r["Symplicity Student ID"]||r["Student ID"]||r["Name"]||"unknown";
  const isCancelled=r=>(r["Appointment Cancelled"]||"").toLowerCase()==="yes";

  const delivered=useMemo(()=>apptData.filter(r=>!isCancelled(r)),[apptData]);
  const cancelled=apptData.filter(isCancelled);

  const totalMins=delivered.reduce((a,r)=>a+mins(r),0);
  const totalHrs=(totalMins/60).toFixed(1);
  const uniqueStudents=new Set(delivered.map(sid)).size;

  // Semester breakdown
  const bySem=(sem)=>delivered.filter(r=>getSem(r)===sem);
  const fallAppts=bySem(fS),springAppts=bySem(sS),summerAppts=bySem(suS);
  const fallHrs=(fallAppts.reduce((a,r)=>a+mins(r),0)/60).toFixed(1);
  const springHrs=(springAppts.reduce((a,r)=>a+mins(r),0)/60).toFixed(1);

  // By appointment type
  const byType=useMemo(()=>{const m={};delivered.forEach(r=>{const t=r["Appointment Type"]||"Unknown";if(!m[t])m[t]={count:0,mins:0,students:new Set()};m[t].count++;m[t].mins+=mins(r);m[t].students.add(sid(r))});return Object.entries(m).map(([name,v])=>({name,count:v.count,hours:(v.mins/60).toFixed(1),uniqueStudents:v.students.size})).sort((a,b)=>b.count-a.count)},[delivered]);

  // Virtual vs In-person
  const virtual=delivered.filter(r=>(r["Appointment Type"]||"").toLowerCase().includes("virtual"));
  const inperson=delivered.filter(r=>!(r["Appointment Type"]||"").toLowerCase().includes("virtual"));
  const virtualHrs=(virtual.reduce((a,r)=>a+mins(r),0)/60).toFixed(1);
  const inpersonHrs=(inperson.reduce((a,r)=>a+mins(r),0)/60).toFixed(1);

  // By staff
  const byStaff=useMemo(()=>{const m={};delivered.forEach(r=>{const s=r["Staff"]||"Unknown";if(!m[s])m[s]={count:0,mins:0,students:new Set()};m[s].count++;m[s].mins+=mins(r);m[s].students.add(sid(r))});return Object.entries(m).map(([name,v])=>({name,count:v.count,hours:(v.mins/60).toFixed(1),uniqueStudents:v.students.size})).sort((a,b)=>b.count-a.count)},[delivered]);

  const TypeBadge=({label})=>{const virt=label.toLowerCase().includes("virtual");return<span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:virt?`${CO.purple}20`:`${teal}20`,color:virt?CO.purple:teal,fontWeight:600}}>{virt?"Virtual":"In-Person"}</span>};

  return(<div className="fade-up">
    <h2 style={{fontSize:26,fontWeight:800,marginBottom:6}}>Direct Service Appointments</h2>
    <p style={{fontSize:13,color:CO.muted,marginBottom:24}}>One-on-one appointments delivered by OARS staff — excludes cancelled.</p>

    {/* Top stat cards */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
      <SC label="Unique Students Served" value={uniqueStudents} color={teal}/>
      <SC label="Total Appointments" value={delivered.length} color={CO.accent}/>
      <SC label="Total Hours of Service" value={totalHrs} color={CO.green}/>
      <SC label="Cancelled" value={cancelled.length} color={CO.red} sub={apptData.length?`${((cancelled.length/apptData.length)*100).toFixed(1)}% of all`:""}/>
    </div>

    {/* Semester + modality row */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:24}}>
      <div style={{background:CO.card,borderRadius:14,border:`1px solid ${CO.border}`,padding:20}}>
        <p style={{fontSize:12,color:CO.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}}>By Semester</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          {[{label:fS,appts:fallAppts,hrs:fallHrs,col:CO.orange},{label:sS,appts:springAppts,hrs:springHrs,col:CO.green},{label:suS,appts:summerAppts,hrs:(summerAppts.reduce((a,r)=>a+mins(r),0)/60).toFixed(1),col:CO.yellow}].map(s=>(
            <div key={s.label} style={{textAlign:"center",padding:"12px 8px",borderRadius:10,background:`${s.col}0c`}}>
              <p style={{fontSize:10,color:CO.dim,textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>{s.label}</p>
              <p style={{fontSize:22,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:s.col}}>{s.appts.length}</p>
              <p style={{fontSize:11,color:CO.muted,marginTop:2}}>{s.hrs} hrs</p>
              <p style={{fontSize:10,color:CO.dim,marginTop:1}}>{new Set(s.appts.map(sid)).size} students</p>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:CO.card,borderRadius:14,border:`1px solid ${CO.border}`,padding:20}}>
        <p style={{fontSize:12,color:CO.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}}>In-Person vs Virtual</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[{label:"In-Person",data:inperson,hrs:inpersonHrs,col:teal},{label:"Virtual",data:virtual,hrs:virtualHrs,col:CO.purple}].map(m=>(
            <div key={m.label} style={{textAlign:"center",padding:"14px 10px",borderRadius:10,background:`${m.col}0c`,border:`1px solid ${m.col}30`}}>
              <p style={{fontSize:11,color:m.col,fontWeight:700,marginBottom:6}}>{m.label}</p>
              <p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:m.col}}>{m.data.length}</p>
              <p style={{fontSize:12,color:CO.muted,marginTop:2}}>{m.hrs} hrs</p>
              <p style={{fontSize:11,color:CO.dim,marginTop:1}}>{new Set(m.data.map(sid)).size} unique students</p>
            </div>
          ))}
        </div>
      </div>
    </div>

    {/* By appointment type */}
    <div style={{marginBottom:24}}>
      <p style={{fontSize:12,color:CO.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>Breakdown by Appointment Type</p>
      <div style={{background:CO.card,borderRadius:14,border:`1px solid ${CO.border}`,overflow:"hidden"}}>
        <div style={{overflow:"auto",maxHeight:"35vh"}}>
          <table><thead><tr><th>Appointment Type</th><th></th><th style={{textAlign:"right"}}>Appointments</th><th style={{textAlign:"right"}}>Hours</th><th style={{textAlign:"right"}}>Unique Students</th><th style={{textAlign:"right"}}>Avg/Student</th></tr></thead>
          <tbody>{byType.map((row,i)=>(
            <tr key={i}>
              <td style={{fontWeight:500,maxWidth:280}}>{row.name}</td>
              <td><TypeBadge label={row.name}/></td>
              <td style={{textAlign:"right",fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{row.count}</td>
              <td style={{textAlign:"right"}}><span className="badge badge-green">{row.hours} hrs</span></td>
              <td style={{textAlign:"right",fontWeight:700,color:teal}}>{row.uniqueStudents}</td>
              <td style={{textAlign:"right",color:CO.muted,fontSize:12}}>{(row.count/row.uniqueStudents).toFixed(1)}x</td>
            </tr>
          ))}</tbody></table>
        </div>
      </div>
    </div>

    {/* By staff */}
    <div style={{marginBottom:16}}>
      <p style={{fontSize:12,color:CO.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>Breakdown by Staff Member</p>
      <div style={{background:CO.card,borderRadius:14,border:`1px solid ${CO.border}`,overflow:"hidden"}}>
        <table><thead><tr><th>Staff Member</th><th style={{textAlign:"right"}}>Appointments</th><th style={{textAlign:"right"}}>Hours</th><th style={{textAlign:"right"}}>Unique Students</th><th style={{textAlign:"right"}}>Avg Appts/Student</th></tr></thead>
        <tbody>{byStaff.map((row,i)=>(
          <tr key={i}>
            <td style={{fontWeight:600}}>{row.name}</td>
            <td style={{textAlign:"right",fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{row.count}</td>
            <td style={{textAlign:"right"}}><span className="badge badge-green">{row.hours} hrs</span></td>
            <td style={{textAlign:"right",fontWeight:700,color:teal}}>{row.uniqueStudents}</td>
            <td style={{textAlign:"right",color:CO.muted,fontSize:12}}>{(row.count/row.uniqueStudents).toFixed(1)}x</td>
          </tr>
        ))}
        <tr style={{background:`${teal}0c`}}>
          <td style={{fontWeight:700}}>TOTAL</td>
          <td style={{textAlign:"right",fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{delivered.length}</td>
          <td style={{textAlign:"right",fontWeight:700,color:CO.green}}>{totalHrs} hrs</td>
          <td style={{textAlign:"right",fontWeight:700,color:teal}}>{uniqueStudents}</td>
          <td style={{textAlign:"right",color:CO.muted,fontSize:12}}>{uniqueStudents?(delivered.length/uniqueStudents).toFixed(1):0}x avg</td>
        </tr>
        </tbody></table>
      </div>
    </div>

    {/* Summary footer */}
    <div style={{padding:"18px 24px",borderRadius:14,background:`${teal}0c`,border:`1.5px solid ${teal}30`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:16}}>
      <div>
        <p style={{fontSize:11,color:teal,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:4}}>🤝 Direct Services Summary</p>
        <p style={{fontSize:12,color:CO.dim}}>OARS staff delivered {totalHrs} hours of direct service to {uniqueStudents} unique students across {delivered.length} appointments.</p>
      </div>
      <div style={{display:"flex",gap:28}}>
        <StatBlock label="Unique Students" val={uniqueStudents} color={teal} size={28}/>
        <StatBlock label="Total Appointments" val={delivered.length} color={CO.accent} size={28}/>
        <StatBlock label="Total Hours" val={totalHrs} color={CO.green} size={28}/>
      </div>
    </div>
  </div>);
}

/* ═══ INDIRECT CONTACTS TAB ═══ */
function IndirectContactsTab({caseNotesData,studentNotesData,fS,sS,suS}){
  const pink="#c522a0";const amber="#c57a22";const combined="#7a5cf0";
  if(!caseNotesData.length&&!studentNotesData.length)return<Empty msg="Import Case Notes and/or Student Notes files from the Import tab."/>;

  const getDur=r=>parseInt(r["Duration (Case)"]||r["Duration (Student)"]||0)||0;
  const getSid=r=>r["Symplicity Student ID"]||"unknown";
  const getStaff=r=>r["Name of Specialist"]||r["Created By (Student)"]||"Unknown";
  const getCat=r=>r["Category (Case)"]||r["Category (Student)"]||"Unknown";
  const getDate=r=>{
    const d=r["Created"]||r["Date Created (Student)"]||"";
    if(!d||d==="Invalid Date")return null;
    const dt=new Date(d);return isNaN(dt)?null:dt;
  };
  const getSem=r=>{
    const dt=getDate(r);if(!dt)return"Unknown";
    const mo=dt.getMonth()+1,yr=dt.getFullYear();
    if(mo>=8&&mo<=12)return`Fall ${yr}`;
    if(mo>=1&&mo<=5)return`Spring ${yr}`;
    return`Summer ${yr}`;
  };

  // Normalize both sources into unified rows
  const caseRows=useMemo(()=>caseNotesData.map(r=>({...r,_src:"Case Notes",_sid:getSid(r),_staff:getStaff(r),_cat:getCat(r),_dur:getDur(r),_sem:getSem(r)})),[caseNotesData]);
  const studentRows=useMemo(()=>studentNotesData.map(r=>({...r,_src:"Student Notes",_sid:getSid(r),_staff:getStaff(r),_cat:getCat(r),_dur:getDur(r),_sem:getSem(r)})),[studentNotesData]);
  const all=useMemo(()=>[...caseRows,...studentRows],[caseRows,studentRows]);

  // Totals
  const totalRecords=all.length;
  const totalMins=all.reduce((a,r)=>a+r._dur,0);
  const totalHrs=(totalMins/60).toFixed(1);
  const uniqueStudents=new Set(all.map(r=>r._sid)).size;

  // Case notes totals
  const cnMins=caseRows.reduce((a,r)=>a+r._dur,0);
  const cnHrs=(cnMins/60).toFixed(1);
  const cnUnique=new Set(caseRows.map(r=>r._sid)).size;

  // Student notes totals
  const snMins=studentRows.reduce((a,r)=>a+r._dur,0);
  const snHrs=(snMins/60).toFixed(1);
  const snUnique=new Set(studentRows.map(r=>r._sid)).size;

  // By semester
  const bySemStats=(rows,sem)=>{const s=rows.filter(r=>r._sem===sem);return{count:s.length,hrs:(s.reduce((a,r)=>a+r._dur,0)/60).toFixed(1),unique:new Set(s.map(r=>r._sid)).size}};
  const fallAll=bySemStats(all,fS),springAll=bySemStats(all,sS),summerAll=bySemStats(all,suS);

  // By category (combined)
  const byCat=useMemo(()=>{const m={};all.forEach(r=>{const c=r._cat;if(!m[c])m[c]={count:0,mins:0,students:new Set()};m[c].count++;m[c].mins+=r._dur;m[c].students.add(r._sid)});return Object.entries(m).map(([name,v])=>({name,count:v.count,hrs:(v.mins/60).toFixed(1),unique:v.students.size})).sort((a,b)=>b.count-a.count)},[all]);

  // By staff (combined)
  const byStaff=useMemo(()=>{const m={};all.forEach(r=>{const s=r._staff;if(!m[s])m[s]={count:0,mins:0,students:new Set(),src:new Set()};m[s].count++;m[s].mins+=r._dur;m[s].students.add(r._sid);m[s].src.add(r._src)});return Object.entries(m).map(([name,v])=>({name,count:v.count,hrs:(v.mins/60).toFixed(1),unique:v.students.size})).sort((a,b)=>b.count-a.count)},[all]);

  return(<div className="fade-up">
    <h2 style={{fontSize:26,fontWeight:800,marginBottom:6}}>Indirect Contacts</h2>
    <p style={{fontSize:13,color:CO.muted,marginBottom:24}}>Case Notes + Student Notes combined — emails, phone calls, remote contacts, and case work on students' behalf.</p>

    {/* Top stat cards */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
      <SC label="Unique Students" value={uniqueStudents} color={combined}/>
      <SC label="Total Contacts" value={totalRecords} color={CO.accent}/>
      <SC label="Total Hours" value={totalHrs} color={CO.green}/>
      <SC label="Avg Contacts/Student" value={uniqueStudents?(totalRecords/uniqueStudents).toFixed(1):0} color={CO.yellow}/>
    </div>

    {/* Source breakdown */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
      {[{label:"📝 Case Notes",data:caseRows,hrs:cnHrs,unique:cnUnique,col:amber},{label:"🗒️ Student Notes",data:studentRows,hrs:snHrs,unique:snUnique,col:pink}].map(s=>(
        <div key={s.label} style={{background:CO.card,borderRadius:14,border:`1.5px solid ${s.col}30`,padding:"18px 20px"}}>
          <p style={{fontSize:11,color:s.col,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}}>{s.label}</p>
          {s.data.length===0
            ?<p style={{fontSize:13,color:CO.dim}}>No data loaded</p>
            :<div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
              <div><p style={{fontSize:10,color:CO.dim,textTransform:"uppercase",letterSpacing:".05em",marginBottom:2}}>Records</p><p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:s.col}}>{s.data.length.toLocaleString()}</p></div>
              <div><p style={{fontSize:10,color:CO.dim,textTransform:"uppercase",letterSpacing:".05em",marginBottom:2}}>Hours</p><p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.green}}>{s.hrs}</p></div>
              <div><p style={{fontSize:10,color:CO.dim,textTransform:"uppercase",letterSpacing:".05em",marginBottom:2}}>Unique Students</p><p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:combined}}>{s.unique.toLocaleString()}</p></div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
        {[{label:fS,s:fallAll,col:CO.orange},{label:sS,s:springAll,col:CO.green},{label:suS,s:summerAll,col:CO.yellow}].map(x=>(

    {/* By category */}

      <p style={{fontSize:12,color:CO.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>By Contact Category</p>
      <div style={{background:CO.card,borderRadius:14,border:`1px solid ${CO.border}`,overflow:"hidden"}}>
        <table><thead><tr><th>Category</th><th style={{textAlign:"right"}}>Contacts</th><th style={{textAlign:"right"}}>Hours</th><th style={{textAlign:"right"}}>Unique Students</th><th style={{textAlign:"right"}}>% of Total</th></tr></thead>
        <tbody>{byCat.map((row,i)=>(
          <tr key={i}>
