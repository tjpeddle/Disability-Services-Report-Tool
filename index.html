            <td style={{textAlign:"right"}}><span className="badge badge-green">{row.hrs} hrs</span></td>
            <td style={{textAlign:"right",color:combined,fontWeight:600}}>{row.unique.toLocaleString()}</td>
            <td style={{textAlign:"right",color:CO.muted,fontSize:12}}>{(row.count/row.unique).toFixed(1)}x</td>
          </tr>
        ))}
        <tr style={{background:`${combined}0c`}}>
          <td style={{fontWeight:700}}>TOTAL</td>
          <td style={{textAlign:"right",fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{totalRecords.toLocaleString()}</td>
          <td style={{textAlign:"right",fontWeight:700,color:CO.green}}>{totalHrs} hrs</td>
          <td style={{textAlign:"right",fontWeight:700,color:combined}}>{uniqueStudents.toLocaleString()}</td>
          <td style={{textAlign:"right",color:CO.muted,fontSize:12}}>{uniqueStudents?(totalRecords/uniqueStudents).toFixed(1):0}x avg</td>
        </tr>
        </tbody></table>
      </div>
    </div>

    {/* Summary footer */}
    <div style={{padding:"18px 24px",borderRadius:14,background:`${combined}0c`,border:`1.5px solid ${combined}30`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:16}}>
      <div>
        <p style={{fontSize:11,color:combined,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:4}}>📬 Indirect Contacts Summary</p>
        <p style={{fontSize:12,color:CO.dim}}>OARS staff logged {totalHrs} hours across {totalRecords.toLocaleString()} indirect contacts with {uniqueStudents.toLocaleString()} unique students.</p>
      </div>
      <div style={{display:"flex",gap:28}}>
        <StatBlock label="Unique Students" val={uniqueStudents} color={combined} size={28}/>
        <StatBlock label="Total Contacts" val={totalRecords} color={CO.accent} size={28}/>
        <StatBlock label="Total Hours" val={totalHrs} color={CO.green} size={28}/>
      </div>
    </div>
  </div>);
}

/* ═══ INCOMING STUDENTS TAB ═══ */
function IncomingTab({incomingData,fS,sS}){
  const gold="#e6b94a";
  if(!incomingData.length)return<Empty msg="Import the Incoming Students file from the Import tab."/>;

  // Column mapping: Name, Student ID, Requested Accommodation, Class Level, Approved(date), Approved(status)
  const sid=r=>r["Student ID"]||r["Name"]||"unknown";
  const accom=r=>r["Requested Accommodation"]||"";
  const status=r=>(r["_ApprovedStatus"]||"").toLowerCase();
  const isAppr=r=>status(r)==="approved";
  const isDen=r=>status(r)==="denied";

  // Only rows that have an accommodation request
  const withAccom=useMemo(()=>incomingData.filter(r=>accom(r).trim()),[incomingData]);

  // Only students with at least one approval
  const approvedSids=useMemo(()=>new Set(withAccom.filter(isAppr).map(sid)),[withAccom]);
  const filtered=useMemo(()=>withAccom.filter(r=>approvedSids.has(sid(r))),[withAccom,approvedSids]);

  // Semester from approval date
  const getSem=r=>{
    const d=r["_ApprovedDate"];
    if(!d||d==="Invalid Date"||d==="None")return"Unknown";
    const dt=new Date(d);if(isNaN(dt))return"Unknown";
    const mo=dt.getMonth()+1,yr=dt.getFullYear();
    if(mo>=8&&mo<=12)return`Fall ${yr}`;
    if(mo>=1&&mo<=5)return`Spring ${yr}`;
    return`Summer ${yr}`;
  };

  // Class label mapping
  const clLabel=cl=>{
    if(!cl)return"Unknown";
    const l=cl.toLowerCase();
    if(l.includes("freshman"))return"Incoming Freshman";
    if(l.includes("dr"))return"Incoming Doctoral";
    if(l.includes("gr"))return"Incoming Grad";
    return cl;
  };

  // Housing check
  const hKw=["housing accommodation","emotional support animal","service animal","accessible transport","single room","without suitemates","with suitemates"];
  const tKw=["extra time","distraction-reduced","paper copy of exam","no scantron","four-function calculator","reader assistive","consideration for computer","consideration for memory","consideration for spelling","break during","enlarged print","foreign language substitution"];
  const isTest=r=>tKw.some(k=>accom(r).toLowerCase().includes(k));
  const isHousing=r=>hKw.some(k=>accom(r).toLowerCase().includes(k));
  const isAcademic=r=>!isHousing(r);

  const acadRows=useMemo(()=>filtered.filter(isAcademic),[filtered]);
  const housRows=useMemo(()=>filtered.filter(isHousing),[filtered]);

  // Build accommodation summary for a set of rows
  const buildSummary=(rows)=>{
    const m={};
    rows.forEach(r=>{
      const a=accom(r);if(!a)return;
      if(!m[a])m[a]={name:a,fallAppr:new Set(),fallDen:new Set(),springAppr:new Set(),springDen:new Set(),allAppr:new Set(),allDen:new Set()};
      const sem=getSem(r);const s=sid(r);
      if(isAppr(r)){m[a].allAppr.add(s);if(sem===fS)m[a].fallAppr.add(s);if(sem===sS)m[a].springAppr.add(s);}
      else if(isDen(r)){m[a].allDen.add(s);if(sem===fS)m[a].fallDen.add(s);if(sem===sS)m[a].springDen.add(s);}
    });
    return Object.values(m).map(v=>({
      name:v.name,
      fallApproved:v.fallAppr.size,fallDenied:v.fallDen.size,
      springApproved:v.springAppr.size,springDenied:v.springDen.size,
      totalApproved:v.allAppr.size,totalDenied:v.allDen.size,
      totalStudents:new Set([...v.allAppr,...v.allDen]).size
    })).sort((a,b)=>b.totalApproved-a.totalApproved);
  };

  const acadSummary=useMemo(()=>buildSummary(acadRows),[acadRows]);
  const housSummary=useMemo(()=>buildSummary(housRows),[housRows]);

  // Totals
  const sumCol=(arr,col)=>arr.reduce((a,r)=>a+r[col],0);
  const uniqueApprTotal=approvedSids.size;
  const uniqueTotal=new Set(withAccom.map(sid)).size;
  const deniedOnlySids=new Set([...new Set(withAccom.map(sid))].filter(s=>!approvedSids.has(s)));

  // By class type
  const byClass=useMemo(()=>{
    const types=["Incoming Freshman","Incoming Grad","Incoming Doctoral"];
    return types.map(label=>{
      const rows=filtered.filter(r=>clLabel(r["Class Level"])===label);
      const apprStudents=new Set(rows.filter(isAppr).map(sid));
      const allStudents=new Set(rows.map(sid));
      const deniedOnly=new Set([...allStudents].filter(s=>!apprStudents.has(s)));
      return{label,appr:apprStudents.size,denied:deniedOnly.size,total:allStudents.size,
        acadAppr:new Set(rows.filter(r=>isAppr(r)&&isAcademic(r)).map(sid)).size,
        housAppr:new Set(rows.filter(r=>isAppr(r)&&isHousing(r)).map(sid)).size,
        testAppr:new Set(rows.filter(r=>isAppr(r)&&isTest(r)).map(sid)).size};
    });
  },[filtered]);

  // Semester totals (unique students)
  const semStats=(sem)=>{
    const rows=withAccom.filter(r=>getSem(r)===sem);
    const appr=new Set(rows.filter(isAppr).map(sid));
    const total=new Set(rows.map(sid));
    const denied=new Set([...total].filter(s=>!appr.has(s)));
    return{appr:appr.size,denied:denied.size,total:total.size};
  };
  const fallStats=semStats(fS),springStats=semStats(sS);

  const AccomTable=({summary,color})=>(
    <div style={{background:CO.card,borderRadius:14,border:`1px solid ${CO.border}`,overflow:"hidden",marginBottom:20}}>
      <div style={{overflow:"auto",maxHeight:"38vh"}}>
        <table><thead><tr>
          <th>Accommodation</th>
          <th style={{textAlign:"right",color:CO.orange}}>Fall Appr.</th>
          <th style={{textAlign:"right",color:CO.dim}}>Fall Den.</th>
          <th style={{textAlign:"right",color:CO.green}}>Spring Appr.</th>
          <th style={{textAlign:"right",color:CO.dim}}>Spring Den.</th>
          <th style={{textAlign:"right",color}}>Total Appr.</th>
          <th style={{textAlign:"right"}}>Total Den.</th>
        </tr></thead>
        <tbody>{summary.map((row,i)=>(
          <tr key={i}>
            <td style={{fontWeight:500,maxWidth:260}}>{row.name}</td>
            <td style={{textAlign:"right",fontFamily:"'JetBrains Mono',monospace",color:row.fallApproved?CO.orange:CO.dim}}>{row.fallApproved||"—"}</td>
            <td style={{textAlign:"right",fontFamily:"'JetBrains Mono',monospace",color:row.fallDenied?CO.red:CO.dim}}>{row.fallDenied||"—"}</td>
            <td style={{textAlign:"right",fontFamily:"'JetBrains Mono',monospace",color:row.springApproved?CO.green:CO.dim}}>{row.springApproved||"—"}</td>
            <td style={{textAlign:"right",fontFamily:"'JetBrains Mono',monospace",color:row.springDenied?CO.red:CO.dim}}>{row.springDenied||"—"}</td>
            <td style={{textAlign:"right",fontWeight:700,color}}>{row.totalApproved}</td>
            <td style={{textAlign:"right",color:CO.red}}>{row.totalDenied||"—"}</td>
          </tr>
        ))}
        <tr style={{background:`${color}0c`}}>
          <td style={{fontWeight:700}}>TOTAL</td>
          <td style={{textAlign:"right",fontWeight:700,color:CO.orange}}>{sumCol(summary,"fallApproved")}</td>
          <td style={{textAlign:"right",color:CO.dim}}>{sumCol(summary,"fallDenied")||"—"}</td>
          <td style={{textAlign:"right",fontWeight:700,color:CO.green}}>{sumCol(summary,"springApproved")}</td>
          <td style={{textAlign:"right",color:CO.dim}}>{sumCol(summary,"springDenied")||"—"}</td>
          <td style={{textAlign:"right",fontWeight:700,color}}>{sumCol(summary,"totalApproved")}</td>
          <td style={{textAlign:"right",color:CO.red}}>{sumCol(summary,"totalDenied")||"—"}</td>
        </tr>
        </tbody></table>
      </div>
    </div>
  );

  return(<div className="fade-up">
    <h2 style={{fontSize:26,fontWeight:800,marginBottom:6}}>🎓 New Student Registrations</h2>
    <p style={{fontSize:13,color:CO.muted,marginBottom:24}}>Incoming Freshman, Graduate, and Doctoral students — only those with at least one approved accommodation shown in detail.</p>

    {/* Top stat cards */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
      <SC label="Interacted with OARS" value={uniqueTotal} color={gold}/>
      <SC label="At Least One Approved" value={uniqueApprTotal} color={CO.green} sub={`of ${uniqueTotal} who interacted`}/>
      <SC label="Denied All / No Approval" value={deniedOnlySids.size} color={CO.red} sub={`of ${uniqueTotal} who interacted`}/>
      <SC label="Received Testing Accom." value={new Set(withAccom.filter(r=>isAppr(r)&&isTest(r)).map(sid)).size} color={CO.orange}/>
    </div>

    {/* Semester snapshot */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:24}}>
      {[{label:fS,s:fallStats,col:CO.orange},{label:sS,s:springStats,col:CO.green}].map(x=>(
        <div key={x.label} style={{background:CO.card,borderRadius:14,border:`1.5px solid ${x.col}30`,padding:"18px 20px"}}>
          <p style={{fontSize:11,color:x.col,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}}>{x.label}</p>
          <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
            <div style={{textAlign:"center",padding:"10px 14px",borderRadius:10,background:`${CO.green}0c`}}>
              <p style={{fontSize:10,color:CO.dim,textTransform:"uppercase",letterSpacing:".05em",marginBottom:2}}>Approved</p>
              <p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.green}}>{x.s.appr}</p>
              <p style={{fontSize:10,color:CO.dim,marginTop:1}}>unique students</p>
            </div>
            <div style={{textAlign:"center",padding:"10px 14px",borderRadius:10,background:`${CO.red}0c`}}>
              <p style={{fontSize:10,color:CO.dim,textTransform:"uppercase",letterSpacing:".05em",marginBottom:2}}>Denied All</p>
              <p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.red}}>{x.s.denied}</p>
              <p style={{fontSize:10,color:CO.dim,marginTop:1}}>unique students</p>
            </div>
            <div style={{textAlign:"center",padding:"10px 14px",borderRadius:10,background:`${x.col}0c`}}>
              <p style={{fontSize:10,color:CO.dim,textTransform:"uppercase",letterSpacing:".05em",marginBottom:2}}>Total</p>
              <p style={{fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:x.col}}>{x.s.total}</p>
              <p style={{fontSize:10,color:CO.dim,marginTop:1}}>interacted</p>
            </div>
          </div>
        </div>
      ))}
    </div>

    {/* Academic Accommodations */}
    <div style={{marginBottom:8}}>
      <p style={{fontSize:13,color:CO.accent,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>◎ Academic Accommodations (including Testing)</p>
      {acadSummary.length?<AccomTable summary={acadSummary} color={CO.accent}/>:<p style={{color:CO.dim,fontSize:13,marginBottom:20}}>No academic accommodations found.</p>}
    </div>

    {/* Housing Accommodations */}
    <div style={{marginBottom:24}}>
      <p style={{fontSize:13,color:CO.purple,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>⌂ Housing Accommodations</p>
      {housSummary.length?<AccomTable summary={housSummary} color={CO.purple}/>:<p style={{color:CO.dim,fontSize:13,marginBottom:20}}>No housing accommodations found.</p>}
    </div>

    {/* Incoming Totals by Class Type */}
    <div style={{borderTop:`2px solid ${gold}30`,paddingTop:24,marginBottom:8}}>
      <p style={{fontSize:13,color:gold,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:16}}>🎓 Incoming Totals by Class Type</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:16}}>
        {byClass.map(c=>(
          <div key={c.label} style={{background:CO.card,borderRadius:14,border:`1.5px solid ${gold}30`,padding:"18px 20px"}}>
            <p style={{fontSize:11,color:gold,fontWeight:700,marginBottom:12}}>{c.label}</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div style={{textAlign:"center",padding:"10px 6px",borderRadius:8,background:`${CO.green}0c`}}>
                <p style={{fontSize:10,color:CO.dim,textTransform:"uppercase",letterSpacing:".04em",marginBottom:2}}>Approved</p>
                <p style={{fontSize:24,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.green}}>{c.appr}</p>
              </div>
              <div style={{textAlign:"center",padding:"10px 6px",borderRadius:8,background:`${CO.red}0c`}}>
                <p style={{fontSize:10,color:CO.dim,textTransform:"uppercase",letterSpacing:".04em",marginBottom:2}}>Denied Only</p>
                <p style={{fontSize:24,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:CO.red}}>{c.denied}</p>
              </div>
            </div>
            <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:11,color:CO.accent}}>◎ {c.acadAppr} academic</span>
              {c.housAppr>0&&<span style={{fontSize:11,color:CO.purple}}>⌂ {c.housAppr} housing</span>}
              {c.testAppr>0&&<span style={{fontSize:11,color:CO.orange}}>✎ {c.testAppr} testing</span>}
            </div>
          </div>
        ))}
      </div>

      {/* Grand total banner */}
      <div style={{padding:"16px 24px",borderRadius:14,background:`${gold}0c`,border:`1.5px solid ${gold}30`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:16}}>
        <div>
          <p style={{fontSize:11,color:gold,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:4}}>🎓 Incoming Grand Total</p>
          <p style={{fontSize:12,color:CO.dim}}>{uniqueApprTotal} incoming students approved out of {uniqueTotal} who interacted with OARS — {deniedOnlySids.size} had no approvals.</p>
        </div>
        <div style={{display:"flex",gap:28}}>
          <StatBlock label="Interacted" val={uniqueTotal} color={gold} size={28}/>
          <StatBlock label="Approved" val={uniqueApprTotal} color={CO.green} size={28}/>
          <StatBlock label="Denied All" val={deniedOnlySids.size} color={CO.red} size={28}/>
        </div>
      </div>
    </div>
  </div>);
}

/* ═══ MAIN APP ═══ */
function App(){
  const[rawData,setRawData]=useState([]);
  const[testRoomData,setTestRoomData]=useState([]);
  const[testAccomData,setTestAccomData]=useState([]);
  const[apptData,setApptData]=useState([]);
  const[caseNotesData,setCaseNotesData]=useState([]);
  const[studentNotesData,setStudentNotesData]=useState([]);
  const[incomingData,setIncomingData]=useState([]);
  const[ay,setAY]=useState("2024-2025");const[tab,setTab]=useState("import");
  const[iSt,setISt]=useState({raw:null,test:null,testaccom:null,appt:null,casenotes:null,studentnotes:null,incoming:null});const[ld,setLd]=useState(false);
  const ys=parseInt(ay.split("-")[0]),fS=`Fall ${ys}`,sS=`Spring ${ys+1}`,suS=`Summer ${ys+1}`;
  const tabs=[
    {id:"import",label:"Import Data",icon:"↑"},
    {id:"summary",label:"Executive Summary",icon:"◈"},
    {id:"academic",label:"Academic Accomm.",icon:"◎"},
    {id:"housing",label:"Housing Report",icon:"⌂"},
    {id:"testroom",label:"Test Room Bookings",icon:"✎"},
    {id:"appointments",label:"Direct Services",icon:"🤝"},
    {id:"indirect",label:"Indirect Contacts",icon:"📬"},
    {id:"incoming",label:"New Student Reg.",icon:"🎓"},
    {id:"students",label:"Student Enrollment",icon:"⦿"},
    {id:"export",label:"Export as Excel",icon:"↓"},
    {id:"generate",label:"Generate Word Report",icon:"📄"},
  ];

  return(<div style={{minHeight:"100vh",background:CO.bg,color:CO.text,fontFamily:"'Outfit',sans-serif"}}>
    <header style={{background:CO.card,borderBottom:`1px solid ${CO.border}`,padding:"14px 32px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:42,height:42,borderRadius:12,background:`linear-gradient(135deg,${CO.accent},${CO.purple})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800}}>DS</div>
        <div><h1 style={{fontSize:17,fontWeight:800}}>Disability Services Report Tool</h1><p style={{fontSize:11.5,color:CO.muted}}>Annual Accommodation & Testing Analysis</p></div></div>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <label style={{fontSize:12.5,color:CO.muted}}>Academic Year:</label>
        <select value={ay} onChange={e=>setAY(e.target.value)} style={{background:CO.bg,color:CO.text,border:`1.5px solid ${CO.border}`,borderRadius:8,padding:"7px 14px",fontSize:14,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>
          {["2019-2020","2020-2021","2021-2022","2022-2023","2023-2024","2024-2025","2025-2026","2026-2027","2027-2028","2028-2029","2029-2030","2030-2031","2031-2032","2032-2033"].map(y=><option key={y} value={y}>{y}</option>)}</select>
        <div style={{padding:"5px 14px",borderRadius:24,background:rawData.length?`${CO.green}18`:`${CO.red}18`,color:rawData.length?CO.green:CO.red,fontSize:12,fontWeight:600}}>{rawData.length?`${rawData.length.toLocaleString()} records`:"No data"}</div>
      </div></header>
    <div style={{display:"flex",height:"calc(100vh - 71px)"}}>
      <nav style={{width:220,background:CO.card,borderRight:`1px solid ${CO.border}`,padding:"20px 0",flexShrink:0,overflowY:"auto"}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"11px 18px",background:tab===t.id?CO.accentSoft:"transparent",border:"none",borderLeft:tab===t.id?`3px solid ${CO.accent}`:"3px solid transparent",color:tab===t.id?CO.accent:CO.muted,cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:tab===t.id?700:400,transition:"all .15s"}}><span style={{fontSize:14,width:20,textAlign:"center"}}>{t.icon}</span>{t.label}</button>)}
        <div style={{margin:"16px 18px",padding:14,background:CO.bg,borderRadius:12,border:`1px solid ${CO.border}`}}>
          <p style={{fontSize:11,color:CO.dim,fontWeight:500,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Workflow</p>
          <p style={{fontSize:11.5,color:CO.muted,lineHeight:1.6}}>1. Import data<br/>2. Review tabs<br/>3. <strong style={{color:CO.accent}}>Generate report</strong></p></div>
      </nav>
      <main style={{flex:1,padding:28,overflow:"auto"}}>
        {tab==="import"&&<ImportTab rawData={rawData} setRawData={setRawData} testRoomData={testRoomData} setTestRoomData={setTestRoomData} testAccomData={testAccomData} setTestAccomData={setTestAccomData} apptData={apptData} setApptData={setApptData} caseNotesData={caseNotesData} setCaseNotesData={setCaseNotesData} studentNotesData={studentNotesData} setStudentNotesData={setStudentNotesData} incomingData={incomingData} setIncomingData={setIncomingData} iSt={iSt} setISt={setISt} ld={ld} setLd={setLd}/>}
        {tab==="summary"&&<ExecTab rawData={rawData} testRoomData={testRoomData} testAccomData={testAccomData} apptData={apptData} caseNotesData={caseNotesData} studentNotesData={studentNotesData} incomingData={incomingData} fS={fS} sS={sS} suS={suS}/>}
        {tab==="academic"&&<AcadTab rawData={rawData} fS={fS} sS={sS}/>}
        {tab==="housing"&&<HousingTab rawData={rawData} fS={fS} sS={sS}/>}
        {tab==="testroom"&&<TestTab testRoomData={testRoomData} testAccomData={testAccomData} fS={fS} sS={sS}/>}
        {tab==="appointments"&&<DirectServicesTab apptData={apptData} fS={fS} sS={sS} suS={suS}/>}
        {tab==="indirect"&&<IndirectContactsTab caseNotesData={caseNotesData} studentNotesData={studentNotesData} fS={fS} sS={sS} suS={suS}/>}
        {tab==="incoming"&&<IncomingTab incomingData={incomingData} fS={fS} sS={sS}/>}
        {tab==="students"&&<StudTab rawData={rawData} testRoomData={testRoomData} testAccomData={testAccomData} apptData={apptData} incomingData={incomingData} fS={fS} sS={sS} suS={suS}/>}
        {tab==="export"&&<ExpTab rawData={rawData} fS={fS} sS={sS}/>}
        {tab==="generate"&&<GenReportTab rawData={rawData} testRoomData={testRoomData} fS={fS} sS={sS} suS={suS} academicYear={ay}/>}
      </main></div></div>);
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
